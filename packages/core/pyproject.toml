[project]
name = "ae-mcp"
version = "0.9.2"
description = "Backend-agnostic MCP server for Adobe After Effects automation"
readme = "../../README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "ae-mcp contributors" }]
dependencies = [
    # CallToolResult direct return needs >=1.19.0 (python-sdk #1459);
    # older SDKs silently mangle it (pydantic models are iterable).
    "mcp>=1.19.0",
    "pydantic>=2.5.0",
    "pillow>=10.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.4", "pytest-asyncio>=0.23"]

[project.scripts]
ae-mcp = "ae_mcp.__main__:main"

[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ae_mcp"]

[tool.hatch.build]
include = [
    "ae_mcp/**/*.py",
    "ae_mcp/jsx_templates/*.jsx",
    "ae_mcp/skills_bundled/*.json",
]
