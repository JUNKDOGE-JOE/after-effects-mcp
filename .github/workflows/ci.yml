name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Python tests (pytest)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        shell: pwsh
        run: pip install uv

      - name: Sync dev deps
        shell: pwsh
        env:
          UV_LINK_MODE: copy
        run: python -m uv sync --group dev

      - name: Run pytest
        shell: pwsh
        env:
          UV_LINK_MODE: copy
        run: python -m uv run pytest -v

  js-tests:
    name: JS tests (panel / sidecar / host)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run host tests
        working-directory: plugin/host
        run: |
          npm ci
          npm test

      - name: Run panel tests
        working-directory: plugin/panel
        run: |
          npm ci
          npm test

      - name: Run sidecar tests
        working-directory: plugin/sidecar
        run: |
          npm ci
          npm test
