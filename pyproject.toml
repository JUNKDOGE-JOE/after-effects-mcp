[tool.uv.workspace]
# packages/backend-aebm is DEV-ONLY (not published to PyPI; lives here so we
# can run live tests against a real AE instance). The published ae-mcp core
# ships zero concrete backends — see packages/backend-aebm/README.md.
members = ["packages/core", "packages/backend-aebm", "packages/snapshot-mss"]

[tool.uv.sources]
ae-mcp                = { workspace = true }
ae-mcp-backend-aebm   = { workspace = true }
ae-mcp-snapshot-mss   = { workspace = true }

# Workspace-level dev dependency group. Run `uv sync --group dev` to install
# pytest etc. for running tests across all sub-packages.
[dependency-groups]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/core/tests", "packages/snapshot-mss/tests"]
markers = [
    "live: requires real AE + a backend reachable; opt-in via AEBM_LIVE_TESTS=1",
    "live_smoke: 3-verb handshake subset of live tests",
]
addopts = "-m 'not live and not live_smoke'"
