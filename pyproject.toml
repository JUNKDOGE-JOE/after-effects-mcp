[tool.uv.workspace]
# This repo is an integrated AE-agent product (plugin + MCP, like Atom but
# under our own brand). packages/backend-aebm/ is the canonical bridge to
# our AE plugin (AEBMethod). The "backend" abstraction in core/ exists
# for internal architectural cleanliness — it does NOT advertise a
# pluggable third-party-backend story.
members = ["packages/core", "packages/backend-aebm", "packages/snapshot-mss"]

[tool.uv.sources]
ae-mcp                = { workspace = true }
ae-mcp-backend-aebm   = { workspace = true }
ae-mcp-snapshot-mss   = { workspace = true }

# Workspace-level dev dependency group. Run `uv sync --group dev` to install
# pytest etc. for running tests across all sub-packages.
[dependency-groups]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/core/tests", "packages/backend-aebm/tests", "packages/snapshot-mss/tests"]
markers = [
    "live: requires real AE + a backend reachable; opt-in via AEBM_LIVE_TESTS=1",
    "live_smoke: 3-verb handshake subset of live tests",
]
addopts = "-m 'not live and not live_smoke'"
