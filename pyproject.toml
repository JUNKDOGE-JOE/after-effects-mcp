[tool.uv.workspace]
members = ["packages/core", "packages/bridge", "packages/snapshot-mss"]

[tool.uv.sources]
ae-mcp                = { workspace = true }
ae-mcp-bridge         = { workspace = true }
ae-mcp-snapshot-mss   = { workspace = true }

# Workspace dependency groups keep build tooling separate from production and dev.
# Run `uv sync --group dev` to install pytest etc. across all sub-packages.
[dependency-groups]
build = [
    "hatchling==1.31.0",
]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages/core/tests", "packages/bridge/tests", "packages/snapshot-mss/tests"]
markers = [
    "live: requires real AE + a backend reachable; opt-in via AE_MCP_LIVE_TESTS=1",
    "live_smoke: 3-verb handshake subset of live tests",
]
addopts = "--import-mode=importlib -m 'not live and not live_smoke'"
